<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automação Logística | 3 Corações</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/semi-truck.png" />
    <script>
      // Suprimir erros de Script Error globais que poluem e atrapalham o ambiente
      window.onerror = function(message, source, lineno, colno, error) {
        if (message === "Script error." || (source && source.indexOf('pdf.js') !== -1) || (source && source.indexOf('pdf.worker.min.js') !== -1)) {
          console.warn('Suprimido erro CORS externo ou de biblioteca de terceiros:', message, source);
          return true; // Evita que o erro propague e acione alertas globais de sandbox
        }
        return false;
      };

      window.addEventListener('unhandledrejection', function(e) {
        console.warn('Capturada rejeição de promise global não tratada:', e.reason);
        if (e.reason && (e.reason.message === 'Script error.' || e.reason.message === 'Script error')) {
          e.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
