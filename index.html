<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automação Logística | 3 Corações</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/semi-truck.png" />
    <script>
      // Suprimir erros de Script Error globais que poluem e atrapalham o ambiente
      window.onerror = function(message, source, lineno, colno, error) {
        var msg = String(message || "");
        if (msg.indexOf("Script error") !== -1 || msg.indexOf("Script error.") !== -1 || (source && (source.indexOf('pdf.js') !== -1 || source.indexOf('pdf.worker') !== -1))) {
          console.warn('Suprimido erro CORS externo ou de biblioteca de terceiros:', message, source);
          return true; // Evita que o erro propague e acione alertas globais de sandbox
        }
        return false;
      };

      window.addEventListener('error', function(e) {
        var msg = String(e.message || "");
        if (msg.indexOf("Script error") !== -1 || msg.indexOf("Script error.") !== -1) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        var reasonStr = "";
        if (e.reason) {
          reasonStr = typeof e.reason === "string" ? e.reason : (e.reason.message || "");
        }
        if (reasonStr.indexOf("Script error") !== -1 || reasonStr.indexOf("Script error.") !== -1) {
          e.preventDefault();
          e.stopPropagation();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
